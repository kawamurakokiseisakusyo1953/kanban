<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>生産記録</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1f2e; --card: #242938; --border: #2e3548;
    --accent: #4f9cf9; --accent2: #34d399; --danger: #f87171;
    --warn: #fbbf24; --text: #e8eaf0; --sub: #8892a4; --input-bg: #1a1f2e;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
  header .logo { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 700; }
  header .right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .hbtn { background: var(--border); border: none; border-radius: 20px; padding: 5px 10px; font-size: 11px; color: var(--sub); cursor: pointer; white-space: nowrap; }
  .hbtn.has-data { background: rgba(251,191,36,0.2); color: var(--warn); border: 1px solid var(--warn); }
  .maker-badge { background: var(--border); border-radius: 20px; padding: 5px 10px; font-size: 11px; color: var(--sub); cursor: pointer; white-space: nowrap; }

  .screen { display: none; flex-direction: column; flex: 1; padding: 20px 16px; overflow-y: auto; }
  .screen.active { display: flex; }
  .screen-title { font-size: 13px; color: var(--sub); letter-spacing: 0.1em; margin-bottom: 20px; }

  .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .field-wrap { display: flex; flex-direction: column; gap: 8px; }
  .field-label { font-size: 13px; color: var(--sub); }
  .maker-select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; padding: 12px 14px; outline: none; }
  .maker-select:focus { border-color: var(--accent); }
  .pw-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 18px; padding: 12px 14px; outline: none; }
  .pw-input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .btn-primary:active { opacity: 0.8; }

  .qr-area { background: #000; border-radius: 16px; overflow: hidden; position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 16px; }
  #qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  canvas#qr-canvas { display: none; }
  .qr-frame-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .qr-frame { width: 60%; aspect-ratio: 1; border: 3px solid var(--accent); border-radius: 8px; }
  .qr-status { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--sub); text-align: center; margin-bottom: 16px; }
  .qr-status.success { color: var(--accent2); border-color: var(--accent2); }
  .qr-status.error { color: var(--danger); border-color: var(--danger); }

  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 12px; color: var(--sub); }
  .info-value { font-size: 15px; font-weight: 600; }
  .num-input-wrap { margin-bottom: 12px; }
  .num-label { font-size: 13px; color: var(--sub); margin-bottom: 8px; display: block; }
  .num-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 28px; font-weight: 700; padding: 14px 16px; outline: none; text-align: center; }
  .num-input:focus { border-color: var(--accent); }
  .check-wrap { display: flex; gap: 16px; margin-bottom: 12px; }
  .check-item { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; cursor: pointer; flex: 1; }
  .check-item input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .check-label { font-size: 15px; font-weight: 600; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; font-weight: 600; padding: 14px 20px; cursor: pointer; text-align: center; }
  .input-footer { position: sticky; bottom: 0; background: var(--bg); padding: 12px 0 8px 0; display: flex; gap: 10px; }
  .kb-tab { flex: 1; background: var(--border); border: none; border-radius: 8px; color: var(--sub); padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .kb-tab.active { background: var(--accent); color: #fff; }
  .kb-panel { display: flex; flex-direction: column; gap: 6px; }
  .kb-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .kb-key { background: var(--border); border: none; border-radius: 8px; color: var(--text); font-size: 16px; padding: 13px 6px; cursor: pointer; min-width: 34px; flex: 1; text-align: center; font-weight: 600; }
  .kb-key:active { background: var(--accent); color: #fff; }
  .kb-wide { flex: 2; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .sending-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .done-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; }
  .done-icon { width: 72px; height: 72px; background: rgba(52,211,153,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .done-title { font-size: 22px; font-weight: 700; }
  .done-sub { font-size: 14px; color: var(--sub); }
  .done-detail { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; width: 100%; margin-top: 8px; }

  .error-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; }
  .error-icon { width: 72px; height: 72px; background: rgba(248,113,113,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; }

  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .list-count { font-size: 13px; color: var(--sub); }
  .item-list { display: flex; flex-direction: column; gap: 10px; }
  .list-empty { text-align: center; color: var(--sub); margin-top: 40px; font-size: 14px; }
  .list-footer { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }

  .unsent-item { background: var(--card); border: 1px solid var(--warn); border-radius: 12px; padding: 14px 16px; }
  .unsent-item .i-time { font-size: 11px; color: var(--sub); margin-bottom: 6px; }
  .unsent-item .i-hinban { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .unsent-item .i-nums { font-size: 13px; color: var(--sub); margin-bottom: 10px; }
  .btn-cancel-item { background: rgba(248,113,113,0.15); border: 1px solid var(--danger); border-radius: 8px; color: var(--danger); font-size: 13px; font-weight: 600; padding: 6px 14px; cursor: pointer; }

  .sent-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .sent-item .i-time { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .sent-item .i-hinban { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .sent-item .i-nums { font-size: 13px; color: var(--sub); }

  .bulk-send-btn { width: 100%; background: var(--accent2); color: #1a1f2e; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .bulk-send-btn:disabled { background: var(--border); color: var(--sub); cursor: not-allowed; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .modal-body { margin-bottom: 20px; }
  .modal-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-row:last-child { border-bottom: none; }
  .modal-row .label { color: var(--sub); }
  .modal-msg { font-size: 14px; color: var(--sub); text-align: center; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btns .btn-cancel { flex: 1; background: var(--border); color: var(--text); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .modal-btns .btn-ok { flex: 2; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .modal-btns .btn-ok.danger { background: var(--danger); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }
  .debug-log { background: #111; color: #0f0; font-size: 11px; padding: 8px; border-radius: 8px; margin-top: 8px; max-height: 60px; overflow-y: auto; font-family: monospace; }
</style>
</head>
<body>

<header>
  <div class="logo">📋</div>
  <h1>生産記録</h1>
  <div class="right">
    <button class="hbtn" id="unsent-btn" onclick="showUnsent()">未送信 0件</button>
    <button class="hbtn" onclick="showHistory()">履歴</button>
    <div class="maker-badge" id="header-maker" onclick="confirmLogout()">未選択</div>
  </div>
</header>

<!-- ログイン -->
<div class="screen active" id="screen-login">
  <div class="screen-title">ログイン</div>
  <div class="login-card">
    <div class="field-wrap">
      <span class="field-label">取引先</span>
      <select class="maker-select" id="maker-select"><option value="">選択してください</option></select>
    </div>
    <div class="field-wrap">
      <span class="field-label">パスワード</span>
      <input class="pw-input" type="password" id="pw-input" placeholder="パスワードを入力" autocomplete="off">
    </div>
    <button class="btn-primary" id="login-btn" onclick="confirmLogin()">決定</button>
    <div id="login-loading" style="display:none;text-align:center;padding:8px 0;">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
        <span id="login-loading-msg" style="font-size:14px;color:var(--sub);">マスタ読み込み中…</span>
      </div>
    </div>
  </div>
</div>

<!-- QR読取 -->
<div class="screen" id="screen-qr">
  <div class="screen-title">かんばんを読み取ってください</div>
  <div class="qr-area">
    <video id="qr-video" playsinline autoplay muted></video>
    <canvas id="qr-canvas"></canvas>
    <div class="qr-frame-overlay"><div class="qr-frame"></div></div>
  </div>
  <div class="qr-status" id="qr-status">カメラを起動中…</div>
  <div class="debug-log" id="debug-log">起動待機中...</div>
</div>

<!-- 数量入力 -->
<div class="screen" id="screen-input">
  <div class="screen-title">数量を入力</div>
  <div class="info-card">
    <div class="info-row"><span class="info-label">品番</span><span class="info-value" id="disp-hinban">—</span></div>
    <div class="info-row"><span class="info-label">工程</span><span class="info-value" id="disp-kotei">—</span></div>
  </div>
  <div class="num-input-wrap">
    <label class="num-label">作業工程</label>
    <select class="maker-select" id="input-sakugyo" style="font-size:18px;padding:14px;">
      <option value="">選択してください</option>
    </select>
  </div>
  <div class="num-input-wrap">
    <label class="num-label">生産数</label>
    <input class="num-input" type="number" id="input-seisan" inputmode="numeric" min="0" placeholder="0">
  </div>
  <div class="num-input-wrap">
    <label class="num-label">廃却数</label>
    <input class="num-input" type="number" id="input-haikyu" inputmode="numeric" min="0" placeholder="0">
  </div>
  <div class="check-wrap">
    <label class="check-item">
      <input type="checkbox" id="check-shizai">
      <span class="check-label">資材ゼロ</span>
    </label>
  </div>
  <!-- 素材ゼロは非表示（スプレッドシート互換のため残す） -->
  <input type="checkbox" id="check-sozai" style="display:none">
  <div class="num-input-wrap">
    <label class="num-label">備考 <span style="font-size:13px;color:var(--sub);font-weight:400">（任意）</span></label>
    <div style="background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:52px;font-size:18px;font-weight:400;cursor:text;word-break:break-all;" id="biko-display" onclick="showCustomKeyboard()">
      <span id="biko-text" style="color:var(--text)"></span><span id="biko-placeholder" style="color:var(--sub)">自由入力</span><span id="biko-cursor" style="display:none;width:2px;height:20px;background:var(--accent);margin-left:1px;vertical-align:middle;animation:blink 1s infinite;">|</span>
    </div>
    <input type="hidden" id="input-biko">

  <!-- カスタムキーボード（画面下部固定） -->
  <div id="custom-keyboard" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--border);padding:10px;z-index:500;max-height:60vh;overflow-y:auto;">
    <!-- タブ切り替え -->
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button class="kb-tab active" id="tab-num" onclick="switchKbTab('num')">数字</button>
      <button class="kb-tab" id="tab-alpha" onclick="switchKbTab('alpha')">英字</button>
      <button class="kb-tab" id="tab-kana" onclick="switchKbTab('kana')">かな</button>
    </div>
    <!-- 数字 -->
    <div id="kb-num" class="kb-panel">
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('1')">1</button>
        <button class="kb-key" onclick="kbInput('2')">2</button>
        <button class="kb-key" onclick="kbInput('3')">3</button>
        <button class="kb-key" onclick="kbInput('4')">4</button>
        <button class="kb-key" onclick="kbInput('5')">5</button>
        <button class="kb-key" onclick="kbInput('6')">6</button>
        <button class="kb-key" onclick="kbInput('7')">7</button>
        <button class="kb-key" onclick="kbInput('8')">8</button>
        <button class="kb-key" onclick="kbInput('9')">9</button>
        <button class="kb-key" onclick="kbInput('0')">0</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('.')">.</button>
        <button class="kb-key" onclick="kbInput('-')">-</button>
        <button class="kb-key" onclick="kbInput('/')">／</button>
        <button class="kb-key" onclick="kbInput('(')">（</button>
        <button class="kb-key" onclick="kbInput(')')">）</button>
        <button class="kb-key" onclick="kbInput(' ')">space</button>
        <button class="kb-key kb-wide" onclick="kbDelete()">⌫</button>
      </div>
    </div>
    <!-- 英字 -->
    <div id="kb-alpha" class="kb-panel" style="display:none;">
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('A')">A</button>
        <button class="kb-key" onclick="kbInput('B')">B</button>
        <button class="kb-key" onclick="kbInput('C')">C</button>
        <button class="kb-key" onclick="kbInput('D')">D</button>
        <button class="kb-key" onclick="kbInput('E')">E</button>
        <button class="kb-key" onclick="kbInput('F')">F</button>
        <button class="kb-key" onclick="kbInput('G')">G</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('H')">H</button>
        <button class="kb-key" onclick="kbInput('I')">I</button>
        <button class="kb-key" onclick="kbInput('J')">J</button>
        <button class="kb-key" onclick="kbInput('K')">K</button>
        <button class="kb-key" onclick="kbInput('L')">L</button>
        <button class="kb-key" onclick="kbInput('M')">M</button>
        <button class="kb-key" onclick="kbInput('N')">N</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('O')">O</button>
        <button class="kb-key" onclick="kbInput('P')">P</button>
        <button class="kb-key" onclick="kbInput('Q')">Q</button>
        <button class="kb-key" onclick="kbInput('R')">R</button>
        <button class="kb-key" onclick="kbInput('S')">S</button>
        <button class="kb-key" onclick="kbInput('T')">T</button>
        <button class="kb-key" onclick="kbInput('U')">U</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('V')">V</button>
        <button class="kb-key" onclick="kbInput('W')">W</button>
        <button class="kb-key" onclick="kbInput('X')">X</button>
        <button class="kb-key" onclick="kbInput('Y')">Y</button>
        <button class="kb-key" onclick="kbInput('Z')">Z</button>
        <button class="kb-key" onclick="kbInput(' ')">space</button>
        <button class="kb-key kb-wide" onclick="kbDelete()">⌫</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('a')">a</button>
        <button class="kb-key" onclick="kbInput('b')">b</button>
        <button class="kb-key" onclick="kbInput('c')">c</button>
        <button class="kb-key" onclick="kbInput('d')">d</button>
        <button class="kb-key" onclick="kbInput('e')">e</button>
        <button class="kb-key" onclick="kbInput('f')">f</button>
        <button class="kb-key" onclick="kbInput('g')">g</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('h')">h</button>
        <button class="kb-key" onclick="kbInput('i')">i</button>
        <button class="kb-key" onclick="kbInput('j')">j</button>
        <button class="kb-key" onclick="kbInput('k')">k</button>
        <button class="kb-key" onclick="kbInput('l')">l</button>
        <button class="kb-key" onclick="kbInput('m')">m</button>
        <button class="kb-key" onclick="kbInput('n')">n</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('o')">o</button>
        <button class="kb-key" onclick="kbInput('p')">p</button>
        <button class="kb-key" onclick="kbInput('q')">q</button>
        <button class="kb-key" onclick="kbInput('r')">r</button>
        <button class="kb-key" onclick="kbInput('s')">s</button>
        <button class="kb-key" onclick="kbInput('t')">t</button>
        <button class="kb-key" onclick="kbInput('u')">u</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('v')">v</button>
        <button class="kb-key" onclick="kbInput('w')">w</button>
        <button class="kb-key" onclick="kbInput('x')">x</button>
        <button class="kb-key" onclick="kbInput('y')">y</button>
        <button class="kb-key" onclick="kbInput('z')">z</button>
      </div>
    </div>
    <!-- かな -->
    <div id="kb-kana" class="kb-panel" style="display:none;">
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('あ')">あ</button>
        <button class="kb-key" onclick="kbInput('い')">い</button>
        <button class="kb-key" onclick="kbInput('う')">う</button>
        <button class="kb-key" onclick="kbInput('え')">え</button>
        <button class="kb-key" onclick="kbInput('お')">お</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('ぁ')">ぁ</button>
        <button class="kb-key" onclick="kbInput('ぃ')">ぃ</button>
        <button class="kb-key" onclick="kbInput('ぅ')">ぅ</button>
        <button class="kb-key" onclick="kbInput('ぇ')">ぇ</button>
        <button class="kb-key" onclick="kbInput('ぉ')">ぉ</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('か')">か</button>
        <button class="kb-key" onclick="kbInput('き')">き</button>
        <button class="kb-key" onclick="kbInput('く')">く</button>
        <button class="kb-key" onclick="kbInput('け')">け</button>
        <button class="kb-key" onclick="kbInput('こ')">こ</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('が')">が</button>
        <button class="kb-key" onclick="kbInput('ぎ')">ぎ</button>
        <button class="kb-key" onclick="kbInput('ぐ')">ぐ</button>
        <button class="kb-key" onclick="kbInput('げ')">げ</button>
        <button class="kb-key" onclick="kbInput('ご')">ご</button>
      </div>
      <div class="kb-row">
        <button class="kb-key" onclick="kbInput('さ')">さ</button>
        <button class="kb-key" onclick="kbInput('し')">し</button>
        <button class="kb-key" onclick="kbInput('す')">す</button>
        <button class="kb-key" onclick="kbInput('せ')">せ</button>
        <button class="kb-key" onclick="kbInput('そ')">そ</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwhrISJ5NKxNsTMAmIfXUErRb6i2aOoRglKrseUhRNMjCZj_7k8qFWJpukIZtJfv1RFuw/exec";

let currentMaker = null;
let currentPassword = null;
let currentQR = null;
let currentHinban = null;
let currentKotei = null;
let currentSeisan = null;
let currentHaikyu = null;
let currentSakugyoKotei = null;
let currentShizai = false;
let currentSozai = false;
let currentBiko = "";
let videoStream = null;
let scanInterval = null;
let lastScanned = "";
let lastScannedTime = 0;
let deleteTargetId = null;

function getUnsent() { return JSON.parse(localStorage.getItem("kanban_unsent") || "[]"); }
function saveUnsent(list) { localStorage.setItem("kanban_unsent", JSON.stringify(list)); }
function getHistory() { return JSON.parse(localStorage.getItem("kanban_history") || "[]"); }
function addHistory(entry) {
  let hist = getHistory();
  hist.unshift(entry);
  if (hist.length > 200) hist = hist.slice(0, 200);
  localStorage.setItem("kanban_history", JSON.stringify(hist));
}

function updateUnsentBadge() {
  const count = getUnsent().length;
  const btn = document.getElementById("unsent-btn");
  btn.textContent = "未送信 " + count + "件";
  count > 0 ? btn.classList.add("has-data") : btn.classList.remove("has-data");
}

function dbg(msg) {
  const el = document.getElementById("debug-log");
  if (el) el.textContent = msg;
}
function dbgAppend(msg) {
  const el = document.getElementById("debug-log");
  if (el) el.textContent += " | " + msg;
}

function loadJsQR(callback) {
  if (typeof jsQR === "function") { callback(); return; }
  dbg("jsQR読み込み中...");
  const s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js";
  s.onload = () => { dbg("jsQR完了"); callback(); };
  s.onerror = () => {
    const s2 = document.createElement("script");
    s2.src = "https://unpkg.com/jsqr@1.4.0/dist/jsQR.js";
    s2.onload = () => { dbg("jsQR(代替)完了"); callback(); };
    s2.onerror = () => { dbg("jsQR読み込み失敗"); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

window.onload = () => {
  updateUnsentBadge();
  const savedMaker = localStorage.getItem("kanban_maker");
  const savedPw    = localStorage.getItem("kanban_pw");

  // 起動時から全画面ローディング表示
  showStartLoading("マスタ読み込み中…");

  // マスタからメーカー一覧を取得してドロップダウンを構築
  fetch(GAS_URL + "?action=getMaster")
    .then(r => r.json())
    .then(json => {
      if (json.status !== "ok") { hideStartLoading(); showToast("マスタ取得失敗"); return; }
      const sel = document.getElementById("maker-select");
      sel.innerHTML = '<option value="">選択してください</option>';
      json.makerList.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });
      if (savedMaker) sel.value = savedMaker;
      if (savedPw)    document.getElementById("pw-input").value = savedPw;

      // 自動ログイン
      if (savedMaker && savedPw) {
        currentMaker = savedMaker;
        currentPassword = savedPw;
        document.getElementById("header-maker").textContent = currentMaker;
        updateStartLoading("工程読み込み中…");
        fetchKoteiMaster(currentMaker, savedPw, (result) => {
          hideStartLoading();
          if (!result) return;
          showScreen("screen-qr");
          showWakeOverlay();
        });
      } else {
        hideStartLoading();
      }
    })
    .catch(() => {
      hideStartLoading();
      showToast("マスタ取得エラー（ネット確認）");
      if (savedMaker) {
        const sel = document.getElementById("maker-select");
        sel.innerHTML = `<option value="${savedMaker}">${savedMaker}</option>`;
        if (savedPw) document.getElementById("pw-input").value = savedPw;
      }
    });
};

function showStartLoading(msg) {
  let el = document.getElementById("start-loading");
  if (!el) {
    el = document.createElement("div");
    el.id = "start-loading";
    el.style.cssText = "position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;";
    el.innerHTML = `
      <div style="font-size:32px">📋</div>
      <div class="spinner"></div>
      <div id="start-loading-msg" style="font-size:14px;color:var(--sub);">${msg}</div>
    `;
    document.body.appendChild(el);
  }
}

function updateStartLoading(msg) {
  const el = document.getElementById("start-loading-msg");
  if (el) el.textContent = msg;
}

function hideStartLoading() {
  const el = document.getElementById("start-loading");
  if (el) el.remove();
}

// 自動ログイン時、最初のタップでバイブ・音の権限を有効化してからカメラ起動
function showWakeOverlay() {
  const overlay = document.createElement("div");
  overlay.id = "wake-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(26,31,46,0.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;";
  overlay.innerHTML = `
    <div style="font-size:40px">📷</div>
    <div style="font-size:16px;color:var(--text);font-weight:600">画面をタップして開始</div>
    <div style="font-size:13px;color:var(--sub)">通知音・バイブを有効にします</div>
  `;
  overlay.onclick = () => {
    initAudio();
    if (navigator.vibrate) navigator.vibrate(1);
    overlay.remove();
    loadJsQR(() => startCamera());
  };
  document.body.appendChild(overlay);
}

window.addEventListener("beforeunload", (e) => {
  if (getUnsent().length > 0) { e.preventDefault(); e.returnValue = ""; }
});

document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") confirmLogin(); });

function confirmLogin() {
  initAudio();
  if (navigator.vibrate) navigator.vibrate(1);
  const makerName = document.getElementById("maker-select").value;
  const pw = document.getElementById("pw-input").value.trim();
  if (!makerName) { showToast("取引先を選択してください"); return; }
  if (!pw) { showToast("パスワードを入力してください"); return; }

  showStartLoading("工程読み込み中…");

  fetchKoteiMaster(makerName, pw, (result) => {
    hideStartLoading();
    if (!result) return;
    localStorage.setItem("kanban_maker", makerName);
    localStorage.setItem("kanban_pw", pw);
    currentMaker = makerName;
    currentPassword = pw;
    document.getElementById("header-maker").textContent = currentMaker;
    showScreen("screen-qr");
    loadJsQR(() => startCamera());
  });
}

function confirmLogout() {
  document.getElementById("modal-logout").classList.add("show");
}

function changeMaker() {
  closeModal("modal-logout");
  stopCamera();
  currentMaker = null;
  currentPassword = null;
  localStorage.removeItem("kanban_maker");
  localStorage.removeItem("kanban_pw");
  document.getElementById("header-maker").textContent = "未選択";
  document.getElementById("maker-select").value = "";
  document.getElementById("pw-input").value = "";
  showScreen("screen-login");
}

async function startCamera() {
  initAudio();
  if (navigator.vibrate) navigator.vibrate(1);
  dbg("カメラ起動中...");
  document.getElementById("qr-status").className = "qr-status";
  document.getElementById("qr-status").textContent = "カメラを起動中…";
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById("qr-video");
    video.srcObject = videoStream;
    await video.play();
    dbg("カメラ起動OK");
    document.getElementById("qr-status").textContent = "QRコードをフレームに合わせてください";
    startScan();
  } catch (err) {
    dbg("カメラエラー: " + err.message);
    document.getElementById("qr-status").className = "qr-status error";
    document.getElementById("qr-status").textContent = "カメラエラー: " + err.message;
  }
}

function stopCamera() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (videoStream)  { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}

function startScan() {
  const video = document.getElementById("qr-video");
  const canvas = document.getElementById("qr-canvas");
  const ctx = canvas.getContext("2d");
  let fc = 0;
  scanInterval = setInterval(() => {
    if (!video.videoWidth || !video.videoHeight) return;
    fc++;
    if (fc % 30 === 0) dbg("スキャン中... " + fc + "フレーム");
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    try {
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
      if (code && code.data) {
        const now = Date.now();
        if (code.data === lastScanned && now - lastScannedTime < 3000) return;
        lastScanned = code.data; lastScannedTime = now;
        dbg("QR検出！ " + code.data.length + "文字");
        vibrate();
        beep();
        onQRDetected(code.data);
      }
    } catch(e) { dbg("スキャンエラー:" + e.message); }
  }, 300);
}

function onQRDetected(qr) {
  if (qr.length < 50) {
    document.getElementById("qr-status").className = "qr-status error";
    document.getElementById("qr-status").textContent = "かんばんQRではありません（" + qr.length + "文字）";
    setTimeout(() => {
      document.getElementById("qr-status").className = "qr-status";
      document.getElementById("qr-status").textContent = "QRコードをフレームに合わせてください";
    }, 2000);
    return;
  }
  currentQR = qr;
  currentHinban = qr.substring(38, 63).trim() || "不明";
  currentKotei  = qr.substring(64, 66).trim() || "不明";
  document.getElementById("qr-status").className = "qr-status success";
  document.getElementById("qr-status").textContent = "読み取り成功！";
  setTimeout(() => {
    stopCamera();
    document.getElementById("disp-hinban").textContent = currentHinban;
    document.getElementById("disp-kotei").textContent  = currentKotei;
    document.getElementById("input-seisan").value = "";
    document.getElementById("input-haikyu").value = "";
    document.getElementById("input-sakugyo").value = "";
    document.getElementById("check-shizai").checked = false;
    resetBiko();
    showScreen("screen-input");
    document.getElementById("input-sakugyo").focus();
  }, 500);
}

// 工程マスタをGASから取得してドロップダウンに反映
function fetchKoteiMaster(maker, pw, callback) {
  const url = GAS_URL + "?action=getMaster&maker=" + encodeURIComponent(maker);
  fetch(url)
    .then(r => r.json())
    .then(json => {
      if (json.status !== "ok") {
        showToast("マスタ取得失敗: " + json.message);
        if (callback) callback(null);
        return;
      }
      // パスワード確認
      if (pw && json.password !== pw) {
        showToast("パスワードが違います");
        if (callback) callback(null);
        return;
      }
      // 工程ドロップダウンを構築
      const sel = document.getElementById("input-sakugyo");
      sel.innerHTML = '<option value="">選択してください</option>';
      json.koteiList.forEach(k => {
        const opt = document.createElement("option");
        opt.value = k; opt.textContent = k;
        sel.appendChild(opt);
      });
      if (callback) callback(json);
    })
    .catch(() => {
      showToast("マスタ取得エラー（ネット確認）");
      if (callback) callback(null);
    });
}

function confirmSend() {
  const seisan = document.getElementById("input-seisan").value.trim();
  const haikyu = document.getElementById("input-haikyu").value.trim();
  const sakugyo = document.getElementById("input-sakugyo").value;
  if (!sakugyo) { showToast("作業工程を選択してください"); return; }
  if (!seisan) { showToast("生産数を入力してください"); return; }
  if (!haikyu) { showToast("廃却数を入力してください"); return; }
  if (parseInt(haikyu) > parseInt(seisan)) { showToast("廃却数が生産数を超えています"); return; }
  currentSeisan = seisan; currentHaikyu = haikyu; currentSakugyoKotei = sakugyo;
  currentShizai = document.getElementById("check-shizai").checked;
  currentSozai  = false;
  currentBiko   = document.getElementById("input-biko").value.trim();
  document.getElementById("modal-hinban").textContent = currentHinban;
  document.getElementById("modal-kotei").textContent  = currentKotei;
  document.getElementById("modal-sakugyo").textContent = sakugyo;
  document.getElementById("modal-seisan").textContent = seisan;
  document.getElementById("modal-haikyu").textContent = haikyu;
  document.getElementById("modal-shizai").textContent = currentShizai ? "✅ あり" : "なし";
  document.getElementById("modal-biko").textContent   = currentBiko || "—";
  document.getElementById("modal-confirm").classList.add("show");
}

function saveLocal() {
  closeModal("modal-confirm");
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const datetime = now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  const entry = {
    id: now.getTime(), datetime, maker: currentMaker,
    password: currentPassword,
    qr: currentQR, hinban: currentHinban, kotei: currentKotei,
    sakugyoKotei: currentSakugyoKotei,
    seisan: parseInt(currentSeisan), haikyu: parseInt(currentHaikyu),
    shizai: currentShizai ? 0 : "",
    sozai:  "",
    biko:   currentBiko,
  };
  const unsent = getUnsent();
  unsent.push(entry);
  saveUnsent(unsent);
  updateUnsentBadge();
  document.getElementById("done-detail").innerHTML =
    `<div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">品番</span><span style="font-weight:600">${currentHinban}</span></div>
     <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">工程</span><span style="font-weight:600">${currentKotei}</span></div>
     <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">作業工程</span><span style="font-weight:600">${currentSakugyoKotei}</span></div>
     <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">生産数</span><span style="font-weight:600">${currentSeisan}</span></div>
     <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">廃却数</span><span style="font-weight:600">${currentHaikyu}</span></div>
     <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">資材ゼロ</span><span style="font-weight:600">${currentShizai ? "✅" : "—"}</span></div>
     <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--sub);font-size:13px">備考</span><span style="font-weight:600">${currentBiko || "—"}</span></div>`;
  showScreen("screen-done");
}

function showUnsent() {
  stopCamera();
  const unsent = getUnsent();
  document.getElementById("unsent-count").textContent = unsent.length + "件";
  const list = document.getElementById("unsent-list");
  list.innerHTML = "";
  if (unsent.length === 0) {
    list.innerHTML = '<div class="list-empty">未送信データはありません</div>';
  } else {
    unsent.forEach(item => {
      const div = document.createElement("div");
      div.className = "unsent-item";
      div.innerHTML = `
        <div class="i-time">${item.datetime}　${item.maker}</div>
        <div class="i-hinban">${item.hinban}　<span style="font-size:13px;color:var(--sub)">工程 ${item.kotei}</span></div>
        <div class="i-nums">作業工程 ${item.sakugyoKotei || '—'}　生産数 ${item.seisan}　廃却数 ${item.haikyu}</div>
        <div class="i-nums">資材ゼロ ${item.shizai === 0 ? "✅" : "—"}　${item.biko ? "備考: " + item.biko : ""}</div>
        <button class="btn-cancel-item" onclick="confirmDelete(${item.id})">取り消し</button>`;
      list.appendChild(div);
    });
  }
  const btn = document.getElementById("bulk-send-btn");
  btn.disabled = unsent.length === 0;
  btn.textContent = unsent.length > 0 ? "一括送信（" + unsent.length + "件）" : "一括送信";
  showScreen("screen-unsent");
}

function confirmDelete(id) {
  deleteTargetId = id;
  document.getElementById("modal-delete").classList.add("show");
}

function executeDelete() {
  closeModal("modal-delete");
  let unsent = getUnsent().filter(item => item.id !== deleteTargetId);
  saveUnsent(unsent);
  updateUnsentBadge();
  showUnsent();
  showToast("取り消しました");
}

function confirmBulkSend() {
  const unsent = getUnsent();
  if (unsent.length === 0) return;
  document.getElementById("modal-bulk-msg").textContent = unsent.length + "件のデータを送信します。よろしいですか？";
  document.getElementById("modal-bulk").classList.add("show");
}

async function bulkSend() {
  closeModal("modal-bulk");
  const unsent = getUnsent();
  if (unsent.length === 0) return;
  showScreen("screen-sending");
  let successCount = 0;
  let failCount = 0;
  const remaining = [];
  for (const item of unsent) {
    try {
      const res  = await fetch(GAS_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(item) });
      const json = await res.json();
      if (json.status === "ok") {
        successCount++;
        const now2 = new Date();
        const pad2 = n => String(n).padStart(2, '0');
        const sentDatetime = now2.getFullYear() + '/' + pad2(now2.getMonth()+1) + '/' + pad2(now2.getDate()) + ' ' + pad2(now2.getHours()) + ':' + pad2(now2.getMinutes()) + ':' + pad2(now2.getSeconds());
        addHistory({ ...item, sentDatetime });
      } else {
        failCount++; remaining.push(item);
      }
    } catch(e) { failCount++; remaining.push(item); }
  }
  saveUnsent(remaining);
  updateUnsentBadge();
  if (failCount === 0) {
    document.getElementById("sent-done-sub").textContent = successCount + "件の送信が完了しました";
    showScreen("screen-sent-done");
  } else {
    document.getElementById("error-msg").textContent = successCount + "件成功、" + failCount + "件失敗。失敗分は未送信リストに残っています。";
    showScreen("screen-error");
  }
}

function showHistory() {
  stopCamera();
  const hist = getHistory();
  document.getElementById("history-count").textContent = hist.length + "件";
  const list = document.getElementById("history-list");
  list.innerHTML = "";
  if (hist.length === 0) {
    list.innerHTML = '<div class="list-empty">送信履歴がありません</div>';
  } else {
    hist.forEach(h => {
      const div = document.createElement("div");
      div.className = "sent-item";
      div.innerHTML = `
        <div class="i-time">📅 読取 ${h.datetime}　${h.maker}</div>
        <div class="i-time">📤 送信 ${h.sentDatetime}</div>
        <div class="i-hinban">${h.hinban}　<span style="font-size:13px;color:var(--sub)">工程 ${h.kotei}</span></div>
        <div class="i-nums">作業工程 ${h.sakugyoKotei || '—'}　生産数 ${h.seisan}　廃却数 ${h.haikyu}</div>
        <div class="i-nums">資材ゼロ ${h.shizai === 0 ? "✅" : "—"}　${h.biko ? "備考: " + h.biko : ""}</div>`;
      list.appendChild(div);
    });
  }
  showScreen("screen-history");
}

let sharedAudioCtx = null;

function initAudio() {
  if (!sharedAudioCtx) {
    try {
      sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  // iOS/Androidのブラウザはsuspended状態で始まることがあるためresume
  if (sharedAudioCtx && sharedAudioCtx.state === "suspended") {
    sharedAudioCtx.resume();
  }
}

function vibrate() {
  if (navigator.vibrate) {
    const ok = navigator.vibrate(500);
    dbgAppend("vib:" + ok);
  } else {
    dbgAppend("vib非対応");
  }
}

function beep() {
  if (!sharedAudioCtx) { dbgAppend("ctx無"); return; }
  dbgAppend("state:" + sharedAudioCtx.state);
  try {
    const osc = sharedAudioCtx.createOscillator();
    const gain = sharedAudioCtx.createGain();
    osc.connect(gain);
    gain.connect(sharedAudioCtx.destination);
    osc.frequency.value = 1200;
    osc.type = "square";
    gain.gain.setValueAtTime(0.3, sharedAudioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, sharedAudioCtx.currentTime + 0.15);
    osc.start(sharedAudioCtx.currentTime);
    osc.stop(sharedAudioCtx.currentTime + 0.15);
    dbgAppend("beep実行");
  } catch(e) { dbgAppend("beepエラー:" + e.message); }
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goToQr() { showScreen("screen-qr"); lastScanned = ""; startCamera(); }
function backToQr() { showScreen("screen-qr"); startCamera(); }
function nextScan() { showScreen("screen-qr"); lastScanned = ""; startCamera(); }
function closeModal(id) { document.getElementById(id).classList.remove("show"); }
// ========================================
// カスタムキーボード
// ========================================
let bikoValue = "";

function showCustomKeyboard() {
  document.getElementById("custom-keyboard").style.display = "block";
  document.getElementById("biko-cursor").style.display = "inline-block";
  document.getElementById("biko-display").style.borderColor = "var(--accent)";
  updateBikoDisplay();
}

function hideCustomKeyboard() {
  document.getElementById("custom-keyboard").style.display = "none";
  document.getElementById("biko-cursor").style.display = "none";
  document.getElementById("biko-display").style.borderColor = "var(--border)";
  document.getElementById("input-biko").value = bikoValue;
}

// 他の項目タップでキーボードを閉じる
document.addEventListener("click", (e) => {
  const kb = document.getElementById("custom-keyboard");
  const display = document.getElementById("biko-display");
  if (kb && display && !kb.contains(e.target) && !display.contains(e.target)) {
    if (kb.style.display !== "none") hideCustomKeyboard();
  }
});

function switchKbTab(tab) {
  document.querySelectorAll(".kb-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".kb-panel").forEach(p => p.style.display = "none");
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("kb-" + tab).style.display = "flex";
}

function kbInput(char) {
  bikoValue += char;
  updateBikoDisplay();
  document.getElementById("input-biko").value = bikoValue;
}

function kbDelete() {
  if (bikoValue.length > 0) {
    bikoValue = bikoValue.slice(0, -1);
    updateBikoDisplay();
    document.getElementById("input-biko").value = bikoValue;
  }
}

function updateBikoDisplay() {
  const el = document.getElementById("biko-text");
  const ph = document.getElementById("biko-placeholder");
  if (el) el.textContent = bikoValue || "";
  if (ph) ph.style.display = bikoValue ? "none" : "inline";
}

function resetBiko() {
  bikoValue = "";
  updateBikoDisplay();
  document.getElementById("input-biko").value = "";
  document.getElementById("custom-keyboard").style.display = "none";
  document.getElementById("biko-cursor").style.display = "none";
  document.getElementById("biko-display").style.borderColor = "var(--border)";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
